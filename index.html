<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAGE9 · 인터넷 속도 측정</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root {
    --brand-orange: #FF5B1D;
    --brand-orange-deep: #E6390A;
    --brand-orange-soft: #FFE4D6;
    --brand-ink: #0F172A;
    --bg-deep: #0B1220;
    --bg-card: #111A2E;
    --bg-inner: #0E1626;
    --border: #1F2A44;
    --text: #F1F5F9;
    --text-muted: #94A3B8;
    --text-faint: #64748B;
    --ok: #10B981;
    --fail: #EF4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    background:
      radial-gradient(1100px 600px at 12% -10%, rgba(255,91,29,0.12), transparent 60%),
      radial-gradient(900px 500px at 110% 110%, rgba(255,91,29,0.08), transparent 60%),
      linear-gradient(180deg, #0B1220 0%, #0F172A 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .container {
    background: var(--bg-card);
    border-radius: 20px;
    padding: 36px 28px 28px;
    max-width: 460px;
    width: 100%;
    box-shadow: 0 25px 60px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,91,29,0.08) inset;
    border: 1px solid var(--border);
  }
  .header { text-align: center; margin-bottom: 24px; }
  .brand-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 14px; }
  .brand-logo { height: 56px; width: auto; margin-bottom: 6px; }
  .brand-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--brand-orange);
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid rgba(255,91,29,0.35);
    border-radius: 999px;
    background: rgba(255,91,29,0.08);
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .header p {
    color: var(--text-muted);
    font-size: 13px;
  }
  .branch-select {
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg-inner);
    color: var(--text);
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat: no-repeat;
    background-position: right 16px center;
    padding-right: 40px;
  }
  .branch-select:focus { outline: none; border-color: var(--brand-orange); box-shadow: 0 0 0 3px rgba(255,91,29,0.18); }
  .btn-start {
    width: 100%;
    padding: 20px;
    font-size: 18px;
    font-weight: 700;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--brand-orange) 0%, var(--brand-orange-deep) 100%);
    color: white;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    letter-spacing: -0.2px;
    font-family: inherit;
  }
  .btn-start:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 12px 28px -8px rgba(255,91,29,0.55);
  }
  .btn-start:active:not(:disabled) { transform: translateY(0); }
  .btn-start:disabled { background: #475569; cursor: not-allowed; opacity: 0.85; }
  .status {
    margin-top: 18px;
    padding: 14px 16px;
    text-align: center;
    background: var(--bg-inner);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 13px;
    color: var(--text-muted);
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.5;
  }
  .results { margin-top: 16px; display: none; gap: 10px; grid-template-columns: 1fr 1fr; }
  .results.show { display: grid; }
  .metric {
    background: var(--bg-inner);
    padding: 18px 14px;
    border-radius: 12px;
    text-align: center;
    border: 1.5px solid var(--border);
    transition: border-color 0.3s, background 0.3s;
  }
  .metric.pass { border-color: var(--ok); background: rgba(16,185,129,0.06); }
  .metric.fail { border-color: var(--fail); background: rgba(239,68,68,0.06); }
  .metric-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 600;
    letter-spacing: 0.6px;
    text-transform: uppercase;
  }
  .metric-value { font-size: 26px; font-weight: 700; letter-spacing: -1px; color: var(--text); }
  .metric-unit { font-size: 12px; color: var(--text-muted); margin-left: 3px; font-weight: 500; }
  .metric.pass .metric-value { color: var(--ok); }
  .metric.fail .metric-value { color: var(--fail); }
  .summary {
    margin-top: 14px;
    padding: 14px;
    border-radius: 12px;
    text-align: center;
    font-weight: 600;
    font-size: 14px;
    display: none;
    line-height: 1.5;
  }
  .summary.pass { background: rgba(16,185,129,0.12); color: var(--ok); border: 1px solid rgba(16,185,129,0.35); }
  .summary.fail { background: rgba(239,68,68,0.12); color: var(--fail); border: 1px solid rgba(239,68,68,0.35); }
  .summary.show { display: block; }
  .btn-alert {
    display: none;
    width: 100%;
    margin-top: 10px;
    padding: 13px;
    background: var(--brand-orange);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .btn-alert.show { display: block; }
  .btn-alert:hover:not(:disabled) { background: var(--brand-orange-deep); }
  .btn-alert:disabled { background: #64748b; cursor: not-allowed; opacity: 0.7; }
  .meta { margin-top: 14px; text-align: center; font-size: 11px; color: var(--text-faint); }
  .threshold-info { text-align: center; font-size: 11px; color: var(--text-faint); margin-top: 10px; }
  .spinner {
    display: inline-block;
    width: 13px;
    height: 13px;
    border: 2px solid rgba(255,91,29,0.25);
    border-top-color: var(--brand-orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<script>
const THRESHOLD_DOWN = 100;
const THRESHOLD_UP = 100;

// stage9-fm /api/notify 프록시 (Teams Workflow 으로 전달)
const NOTIFY_URL = 'https://stage9-fm.vercel.app/api/notify';

async function sendTeamsAlert(branch, down, up, ping, ts, passed) {
  try {
    const r = await fetch(NOTIFY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        kind: 'speedtest',
        speedtestBranch: branch,
        speedtestDown: Number(down.toFixed(2)),
        speedtestUp: Number(up.toFixed(2)),
        speedtestPing: ping,
        speedtestThresholdDown: THRESHOLD_DOWN,
        speedtestThresholdUp: THRESHOLD_UP,
        speedtestPassed: passed,
        speedtestAt: ts,
      })
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok || data.ok === false) {
      return { ok: false, reason: data.error || ('HTTP ' + r.status) };
    }
    return { ok: true };
  } catch (e) {
    console.error('Teams 알림 전송 실패', e);
    return { ok: false, reason: (e && e.message) || String(e) };
  }
}

const startBtn = document.getElementById('startBtn');
const statusEl = document.getElementById('status');
const resultsEl = document.getElementById('results');
const summaryEl = document.getElementById('summary');
const alertBtn = document.getElementById('alertBtn');
const metaEl = document.getElementById('meta');
const branchSel = document.getElementById('branch');

const errors = [];
function logError(stage, err) {
  console.error('[' + stage + ']', err);
  errors.push(stage + ': ' + (err && err.message ? err.message : String(err)));
}

let lastResult = null;

function setStatus(text, loading = false) {
  statusEl.innerHTML = loading ? `<span class="spinner"></span>${text}` : text;
}

async function measurePing() {
  const samples = [];
  for (let i = 0; i < 5; i++) {
    const t0 = performance.now();
    try {
      const r = await fetch('https://speed.cloudflare.com/__down?bytes=1000&t=' + Math.random(), { cache: 'no-store' });
      await r.arrayBuffer();
      samples.push(performance.now() - t0);
    } catch (e) {
      logError('ping', e);
    }
  }
  if (samples.length === 0) return null;
  samples.sort((a, b) => a - b);
  return Math.round(samples[Math.floor(samples.length / 2)]);
}

async function downloadOnce(size) {
  const url = 'https://speed.cloudflare.com/__down?bytes=' + size + '&t=' + Math.random();
  const t0 = performance.now();
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  let received = 0;
  if (res.body && res.body.getReader) {
    const reader = res.body.getReader();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      received += value.length;
      const sec = (performance.now() - t0) / 1000;
      if (sec > 0.1) {
        const mbps = (received * 8) / (sec * 1_000_000);
        document.getElementById('downloadValue').textContent = mbps.toFixed(mbps < 10 ? 1 : 0);
      }
    }
  } else {
    const buf = await res.arrayBuffer();
    received = buf.byteLength;
  }
  const elapsed = (performance.now() - t0) / 1000;
  return (received * 8) / (elapsed * 1_000_000);
}

async function measureDownload() {
  const sizes = [25_000_000, 50_000_000, 100_000_000];
  let best = 0;
  let ok = false;
  for (const size of sizes) {
    try {
      const mbps = await downloadOnce(size);
      ok = true;
      if (mbps > best) best = mbps;
      if (best > 50) break;
    } catch (e) {
      logError('download(' + size + ')', e);
    }
  }
  if (!ok) throw new Error('다운로드 측정 실패 — 네트워크 또는 CORS 문제');
  return best;
}

async function uploadOnce(size, endpoint) {
  const raw = new Uint8Array(size);
  for (let i = 0; i < size; i += 4096) raw[i] = (Math.random() * 255) | 0;
  const body = new Blob([raw], { type: 'text/plain' });
  const t0 = performance.now();
  const res = await fetch(endpoint, {
    method: 'POST',
    body: body,
    cache: 'no-store'
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  try { await res.arrayBuffer(); } catch (_) {}
  const elapsed = (performance.now() - t0) / 1000;
  const mbps = (size * 8) / (elapsed * 1_000_000);
  document.getElementById('uploadValue').textContent = mbps.toFixed(mbps < 10 ? 1 : 0);
  return mbps;
}

async function measureUpload() {
  const endpoints = [
    'https://speed.cloudflare.com/__up',
    'https://librespeed.org/backend/empty.php'
  ];
  const sizes = [2_000_000, 5_000_000, 10_000_000, 25_000_000];
  let best = 0;
  let ok = false;
  for (const ep of endpoints) {
    for (const size of sizes) {
      try {
        const mbps = await uploadOnce(size, ep);
        ok = true;
        if (mbps > best) best = mbps;
        if (best > 50) return best;
      } catch (e) {
        logError('upload(' + ep.split('/')[2] + ',' + size + ')', e);
      }
    }
    if (ok) break;
  }
  if (!ok) throw new Error('업로드 측정 실패 — 네트워크 또는 CORS 문제');
  return best;
}

function applyResult(elId, value, threshold) {
  const metric = document.getElementById(elId + 'Metric');
  document.getElementById(elId + 'Value').textContent = value.toFixed(value < 10 ? 1 : 0);
  if (threshold != null) {
    metric.classList.remove('pass', 'fail');
    metric.classList.add(value >= threshold ? 'pass' : 'fail');
  }
}

function buildMailto(branch, down, up, ping, ts) {
  const subject = `[인터넷 속도 미달 알림] ${branch} - ${ts}`;
  const body =
`스테이지나인 인터넷 속도 측정 결과 - 권장속도 미달

■ 지점: ${branch}
■ 측정일시: ${ts}

■ 측정값
  - 다운로드: ${down.toFixed(1)} Mbps ${down < THRESHOLD_DOWN ? '❌ (기준 ' + THRESHOLD_DOWN + ' 미달)' : '✅'}
  - 업로드: ${up.toFixed(1)} Mbps ${up < THRESHOLD_UP ? '❌ (기준 ' + THRESHOLD_UP + ' 미달)' : '✅'}
  - 핑: ${ping} ms

■ 권장속도
  - 다운로드 ${THRESHOLD_DOWN} Mbps / 업로드 ${THRESHOLD_UP} Mbps 이상

시설팀 확인 및 조치 부탁드립니다.`;

  return `mailto:${ALERT_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

startBtn.addEventListener('click', async () => {
  const branch = branchSel.value;
  if (!branch) {
    alert('지점을 먼저 선택해주세요.');
    return;
  }

  startBtn.disabled = true;
  startBtn.textContent = '측정 중...';
  summaryEl.classList.remove('show', 'pass', 'fail');
  alertBtn.classList.remove('show');
  resultsEl.classList.remove('show');
  errors.length = 0;

  ['download', 'upload', 'ping'].forEach(k => {
    document.getElementById(k + 'Value').textContent = '-';
    document.getElementById(k + 'Metric').classList.remove('pass', 'fail');
  });

  const started = new Date();
  let ping = null, down = 0, up = 0;

  try {
    if (navigator.onLine === false) throw new Error('오프라인 상태입니다');
    setStatus('서버 연결 확인 중...', true);
    try {
      const preflight = await fetch('https://speed.cloudflare.com/__down?bytes=1000&t=' + Math.random(), { cache: 'no-store' });
      if (!preflight.ok) throw new Error('테스트 서버 응답 불량 (HTTP ' + preflight.status + ')');
      await preflight.arrayBuffer();
    } catch (e) {
      throw new Error('테스트 서버 접근 실패 — 이 창이 Cowork 내장 미리보기라면 Chrome/Edge로 직접 열어주세요. (원인: ' + (e.message || e) + ')');
    }

    resultsEl.classList.add('show');

    setStatus('핑 측정 중...', true);
    ping = await measurePing();
    if (ping != null) document.getElementById('pingValue').textContent = ping;

    setStatus('다운로드 속도 측정 중...', true);
    down = await measureDownload();
    applyResult('download', down, THRESHOLD_DOWN);

    setStatus('업로드 속도 측정 중...', true);
    up = await measureUpload();
    applyResult('upload', up, THRESHOLD_UP);
  } catch (err) {
    console.error(err);
    summaryEl.classList.add('show', 'fail');
    summaryEl.innerHTML = '❌ 측정 실패: ' + (err.message || err) +
      (errors.length ? '<br><small style="opacity:.7">세부: ' + errors.slice(-3).join(' | ') + '</small>' : '') +
      '<br><small style="opacity:.7">브라우저 콘솔(F12)에서 자세한 오류를 확인하세요</small>';
    setStatus('측정 실패');
    startBtn.disabled = false;
    startBtn.textContent = '다시 측정';
    return;
  }

  const ended = new Date();
  const ts = ended.getFullYear() + '-' +
             String(ended.getMonth() + 1).padStart(2, '0') + '-' +
             String(ended.getDate()).padStart(2, '0') + ' ' +
             String(ended.getHours()).padStart(2, '0') + ':' +
             String(ended.getMinutes()).padStart(2, '0');

  metaEl.textContent = `측정일시: ${ts} · 소요: ${((ended - started) / 1000).toFixed(1)}초 · 지점: ${branch}`;

  const passed = down >= THRESHOLD_DOWN && up >= THRESHOLD_UP;
  lastResult = { branch, down, up, ping, ts, passed };

  summaryEl.classList.add('show');
  if (passed) {
    summaryEl.classList.add('pass');
    summaryEl.textContent = '✅ 권장속도 충족 - 정상';
    setStatus('측정 완료 · Teams DM 알림 전송 중...', true);
  } else {
    summaryEl.classList.add('fail');
    summaryEl.textContent = '⚠️ 권장속도 미달 - Teams DM로 자동 알림됩니다';
    alertBtn.classList.add('show');
    alertBtn.disabled = false;
    alertBtn.textContent = '🔁 Teams 알림 다시 전송';
    setStatus('측정 완료 · 미달 알림 Teams 전송 중...', true);
  }

  const sent = await sendTeamsAlert(branch, down, up, ping, ts, passed);
  if (sent.ok) {
    setStatus(passed
      ? '측정 완료 · 💬 Teams DM 알림 전송 성공'
      : '측정 완료 (미달) · 💬 Teams DM 알림 전송 성공');
  } else {
    setStatus('측정 완료 · ⚠️ Teams 알림 전송 실패 — ' + (sent.reason || '알 수 없음'));
  }

  startBtn.disabled = false;
  startBtn.textContent = '다시 측정';
});

alertBtn.addEventListener('click', async () => {
  if (!lastResult) {
    alert('먼저 측정을 완료해주세요.');
    return;
  }
  alertBtn.disabled = true;
  const origText = alertBtn.textContent;
  alertBtn.textContent = '💬 전송 중...';
  const { branch, down, up, ping, ts, passed } = lastResult;
  const r = await sendTeamsAlert(branch, down, up, ping, ts, passed);
  if (r.ok) {
    alertBtn.textContent = '✅ Teams 알림 재전송 완료';
    setStatus('💬 Teams DM 알림 재전송 성공');
    setTimeout(() => { alertBtn.textContent = origText; alertBtn.disabled = false; }, 3000);
  } else {
    alertBtn.textContent = '❌ 전송 실패 — 다시 시도';
    setStatus('⚠️ Teams 알림 전송 실패: ' + (r.reason || '알 수 없음'));
    setTimeout(() => { alertBtn.disabled = false; }, 1000);
  }
});
</script>
</body>
